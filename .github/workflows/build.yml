name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        # 排除不常见的组合（可选）
        exclude:
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: arm64

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'  # 根据你的 Go 版本调整

      - name: Install dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          # 设置输出文件名
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="campus-net-guard-$GOOS-$GOARCH.exe"
          else
            BINARY_NAME="campus-net-guard-$GOOS-$GOARCH"
          fi
          go build -ldflags="-s -w" -o "$BINARY_NAME" .
          echo "binary_name=$BINARY_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: campus-net-guard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.binary_name }}
          if-no-files-found: error

  # 如果你希望在推送 tag 时自动创建 Release，可添加以下 job
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 用于创建 Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true